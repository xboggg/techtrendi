<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Prerender: wait for the app to signal content is ready (see src/components/PrerenderReady.tsx). No-op for normal visitors. -->
    <script>window.prerenderReady = false;</script>
    <!-- title, description, keywords, author, canonical, robots, Open Graph &
         Twitter tags are injected PER PAGE by SEOHead via vite-react-ssg <Head>.
         Do NOT add static versions here — they block/duplicate the per-page ones. -->

    <!-- Google Search Console Verification -->
    <meta name="google-site-verification" content="googled7c567aac507448a" />
    <!-- Bing Webmaster Tools Verification -->
    <meta name="msvalidate.01" content="25E1D3FED6D9D6816000DEE936ECEBC8" />

    <!-- Security headers are set via .htaccess for better browser compatibility -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- robots, Open Graph & Twitter tags injected per-page by SEOHead -->

    <!-- PWA & Mobile -->
    <meta name="theme-color" content="#0066FF" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="TechTrendi" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=3" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=3" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=3" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png?v=3" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://pagead2.googlesyndication.com" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3437377907350211" crossorigin="anonymous"></script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
