<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg3)"/>
  <circle cx="700" cy="100" r="150" fill="#ffffff" opacity="0.08"/>
  <circle cx="100" cy="500" r="100" fill="#ffffff" opacity="0.08"/>

  <rect x="100" y="80" width="600" height="440" rx="20" fill="#ffffff" opacity="0.15"/>

  <!-- Life Areas Radar Chart mockup -->
  <rect x="130" y="110" width="250" height="200" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="255" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Life Areas Score</text>
  <!-- Simplified radar -->
  <polygon points="255,160 295,180 295,220 255,240 215,220 215,180" fill="#8B5CF6" opacity="0.3" stroke="#8B5CF6" stroke-width="2"/>
  <polygon points="255,170 285,185 285,215 255,230 225,215 225,185" fill="#8B5CF6" opacity="0.5"/>
  <text x="255" y="280" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Health | Wealth | Career | Growth</text>

  <!-- Habit Tracker -->
  <rect x="400" y="110" width="270" height="200" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="535" y="135" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Habit Streaks</text>
  <!-- Habit rows -->
  <rect x="420" y="150" width="120" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="420" y="150" width="100" height="8" rx="2" fill="#8B5CF6"/>
  <text x="550" y="158" font-family="Arial" font-size="10" fill="#1f2937">Exercise 🔥21</text>

  <rect x="420" y="175" width="120" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="420" y="175" width="85" height="8" rx="2" fill="#10B981"/>
  <text x="550" y="183" font-family="Arial" font-size="10" fill="#1f2937">Reading 🔥14</text>

  <rect x="420" y="200" width="120" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="420" y="200" width="110" height="8" rx="2" fill="#F59E0B"/>
  <text x="550" y="208" font-family="Arial" font-size="10" fill="#1f2937">Meditate 🔥30</text>

  <rect x="420" y="225" width="120" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="420" y="225" width="50" height="8" rx="2" fill="#EC4899"/>
  <text x="550" y="233" font-family="Arial" font-size="10" fill="#1f2937">Journal 🔥7</text>

  <!-- Goals Progress -->
  <rect x="130" y="330" width="540" height="100" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="150" y="355" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937">Active Goals</text>

  <!-- Goal 1 -->
  <rect x="150" y="370" width="150" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="150" y="370" width="120" height="8" rx="2" fill="#8B5CF6"/>
  <text x="150" y="395" font-family="Arial" font-size="10" fill="#6b7280">Run Marathon - 80%</text>

  <!-- Goal 2 -->
  <rect x="350" y="370" width="150" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="350" y="370" width="75" height="8" rx="2" fill="#10B981"/>
  <text x="350" y="395" font-family="Arial" font-size="10" fill="#6b7280">Save $10K - 50%</text>

  <!-- Goal 3 -->
  <rect x="550" y="370" width="100" height="8" rx="2" fill="#e5e7eb"/>
  <rect x="550" y="370" width="30" height="8" rx="2" fill="#F59E0B"/>
  <text x="550" y="395" font-family="Arial" font-size="10" fill="#6b7280">Learn Piano - 30%</text>

  <!-- Bottom stats -->
  <rect x="130" y="450" width="540" height="50" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="220" y="480" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Overall Score: 7.2/10</text>
  <text x="400" y="480" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Active Habits: 7</text>
  <text x="580" y="480" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Goals On Track: 4/5</text>

  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Life OS Dashboard</text>
</svg>
