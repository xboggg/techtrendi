<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D97706;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="600" fill="url(#bg2)"/>
  <circle cx="650" cy="150" r="120" fill="#ffffff" opacity="0.1"/>
  <circle cx="150" cy="450" r="80" fill="#ffffff" opacity="0.1"/>

  <rect x="100" y="80" width="600" height="440" rx="20" fill="#ffffff" opacity="0.15" stroke="#ffffff" stroke-opacity="0.3"/>

  <!-- Multiple income stream cards -->
  <rect x="130" y="120" width="170" height="100" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="215" y="155" font-family="Arial" font-size="12" fill="#6b7280" text-anchor="middle">Etsy Shop</text>
  <text x="215" y="185" font-family="Arial" font-size="24" font-weight="bold" fill="#10B981" text-anchor="middle">$1,247</text>

  <rect x="315" y="120" width="170" height="100" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="400" y="155" font-family="Arial" font-size="12" fill="#6b7280" text-anchor="middle">Freelance</text>
  <text x="400" y="185" font-family="Arial" font-size="24" font-weight="bold" fill="#10B981" text-anchor="middle">$2,800</text>

  <rect x="500" y="120" width="170" height="100" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="585" y="155" font-family="Arial" font-size="12" fill="#6b7280" text-anchor="middle">YouTube</text>
  <text x="585" y="185" font-family="Arial" font-size="24" font-weight="bold" fill="#10B981" text-anchor="middle">$523</text>

  <!-- Profit analysis -->
  <rect x="130" y="240" width="350" height="140" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="150" y="270" font-family="Arial" font-size="14" font-weight="bold" fill="#1f2937">True Hourly Rate</text>
  <!-- Bar chart -->
  <rect x="150" y="290" width="100" height="20" rx="3" fill="#F59E0B"/>
  <text x="260" y="305" font-family="Arial" font-size="12" fill="#1f2937">$52/hr - Freelance</text>
  <rect x="150" y="320" width="60" height="20" rx="3" fill="#10B981"/>
  <text x="220" y="335" font-family="Arial" font-size="12" fill="#1f2937">$31/hr - Etsy</text>
  <rect x="150" y="350" width="35" height="20" rx="3" fill="#EF4444"/>
  <text x="195" y="365" font-family="Arial" font-size="12" fill="#1f2937">$11/hr - YouTube</text>

  <!-- Tax set aside -->
  <rect x="500" y="240" width="170" height="140" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="585" y="270" font-family="Arial" font-size="12" fill="#6b7280" text-anchor="middle">Tax Set-Aside</text>
  <text x="585" y="310" font-family="Arial" font-size="28" font-weight="bold" fill="#F59E0B" text-anchor="middle">$1,142</text>
  <text x="585" y="340" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">25% reserved</text>

  <!-- Bottom summary -->
  <rect x="130" y="400" width="540" height="80" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="250" y="445" font-family="Arial" font-size="14" fill="#6b7280" text-anchor="middle">Total Profit</text>
  <text x="250" y="470" font-family="Arial" font-size="20" font-weight="bold" fill="#10B981" text-anchor="middle">$3,428</text>
  <text x="550" y="445" font-family="Arial" font-size="14" fill="#6b7280" text-anchor="middle">Hours Worked</text>
  <text x="550" y="470" font-family="Arial" font-size="20" font-weight="bold" fill="#1f2937" text-anchor="middle">87 hrs</text>

  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Side Hustle Tracker</text>
</svg>
