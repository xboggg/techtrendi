<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F472B6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg7)"/>
  <circle cx="700" cy="100" r="140" fill="#ffffff" opacity="0.08"/>
  <circle cx="100" cy="500" r="100" fill="#ffffff" opacity="0.08"/>

  <rect x="100" y="80" width="600" height="440" rx="20" fill="#ffffff" opacity="0.15"/>

  <!-- Wedding Countdown -->
  <rect x="130" y="110" width="540" height="70" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="400" y="145" font-family="Arial" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">💒 127 Days Until Your Wedding! 💍</text>
  <text x="400" y="168" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Saturday, May 24th, 2025 • Garden Venue</text>

  <!-- Budget Overview -->
  <rect x="130" y="200" width="260" height="140" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="260" y="230" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Budget Overview</text>
  <text x="260" y="265" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Total Budget</text>
  <text x="260" y="290" font-family="Arial" font-size="22" font-weight="bold" fill="#1f2937" text-anchor="middle">$30,000</text>
  <rect x="160" y="305" width="200" height="8" rx="4" fill="#e5e7eb"/>
  <rect x="160" y="305" width="130" height="8" rx="4" fill="#10B981"/>
  <text x="260" y="330" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Spent: $19,500 (65%)</text>

  <!-- Guest Count -->
  <rect x="410" y="200" width="260" height="140" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="540" y="230" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Guest List</text>
  <text x="540" y="280" font-family="Arial" font-size="32" font-weight="bold" fill="#EC4899" text-anchor="middle">142</text>
  <text x="540" y="305" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Attending</text>
  <text x="470" y="330" font-family="Arial" font-size="9" fill="#10B981">✓ 142 Yes</text>
  <text x="540" y="330" font-family="Arial" font-size="9" fill="#EF4444">✗ 18 No</text>
  <text x="600" y="330" font-family="Arial" font-size="9" fill="#F59E0B">? 20 Pending</text>

  <!-- Vendor Payments -->
  <rect x="130" y="360" width="540" height="130" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="150" y="390" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937">Upcoming Payments</text>
  <rect x="150" y="405" width="500" height="1" fill="#e5e7eb"/>
  <text x="150" y="425" font-family="Arial" font-size="10" fill="#1f2937">Photographer - Final</text>
  <text x="450" y="425" font-family="Arial" font-size="10" fill="#F59E0B">Due Feb 1</text>
  <text x="580" y="425" font-family="Arial" font-size="10" font-weight="bold" fill="#1f2937">$2,500</text>
  <text x="150" y="450" font-family="Arial" font-size="10" fill="#1f2937">Catering - Deposit</text>
  <text x="450" y="450" font-family="Arial" font-size="10" fill="#F59E0B">Due Feb 15</text>
  <text x="580" y="450" font-family="Arial" font-size="10" font-weight="bold" fill="#1f2937">$4,000</text>
  <text x="150" y="475" font-family="Arial" font-size="10" fill="#1f2937">Florist - Balance</text>
  <text x="450" y="475" font-family="Arial" font-size="10" fill="#6b7280">Due Mar 1</text>
  <text x="580" y="475" font-family="Arial" font-size="10" font-weight="bold" fill="#1f2937">$1,200</text>

  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Wedding Budget Master</text>
