<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0891B2;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg8)"/>
  <circle cx="700" cy="100" r="140" fill="#ffffff" opacity="0.08"/>

  <rect x="100" y="80" width="600" height="440" rx="20" fill="#ffffff" opacity="0.15"/>

  <!-- Trip Header -->
  <rect x="130" y="110" width="540" height="70" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="400" y="140" font-family="Arial" font-size="18" font-weight="bold" fill="#1f2937" text-anchor="middle">🇯🇵 Japan Adventure</text>
  <text x="400" y="165" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">Mar 15 - Mar 25, 2025 • 10 Days • 2 Travelers</text>

  <!-- Budget -->
  <rect x="130" y="200" width="180" height="120" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="220" y="225" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Trip Budget</text>
  <text x="220" y="260" font-family="Arial" font-size="24" font-weight="bold" fill="#06B6D4" text-anchor="middle">$3,500</text>
  <rect x="150" y="275" width="140" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="150" y="275" width="84" height="6" rx="3" fill="#10B981"/>
  <text x="220" y="305" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Spent: $2,100 (60%)</text>

  <!-- Daily Budget -->
  <rect x="330" y="200" width="120" height="120" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="390" y="225" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Daily Budget</text>
  <text x="390" y="260" font-family="Arial" font-size="20" font-weight="bold" fill="#10B981" text-anchor="middle">$140</text>
  <text x="390" y="285" font-family="Arial" font-size="9" fill="#6b7280" text-anchor="middle">remaining/day</text>

  <!-- Countdown -->
  <rect x="470" y="200" width="200" height="120" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="570" y="225" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">Departure In</text>
  <text x="570" y="270" font-family="Arial" font-size="32" font-weight="bold" fill="#06B6D4" text-anchor="middle">58</text>
  <text x="570" y="295" font-family="Arial" font-size="11" fill="#6b7280" text-anchor="middle">days</text>

  <!-- Itinerary Preview -->
  <rect x="130" y="340" width="340" height="150" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="150" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937">Day 1: Tokyo</text>
  <text x="150" y="395" font-family="Arial" font-size="10" fill="#6b7280">09:00 - Arrive Narita Airport</text>
  <text x="150" y="415" font-family="Arial" font-size="10" fill="#6b7280">12:00 - Check in: Park Hyatt Tokyo</text>
  <text x="150" y="435" font-family="Arial" font-size="10" fill="#6b7280">15:00 - Explore Shibuya</text>
  <text x="150" y="455" font-family="Arial" font-size="10" fill="#6b7280">19:00 - Dinner: Ramen Street</text>
  <text x="150" y="475" font-family="Arial" font-size="9" fill="#06B6D4">View full itinerary →</text>

  <!-- Packing Status -->
  <rect x="490" y="340" width="180" height="150" rx="10" fill="#ffffff" opacity="0.95"/>
  <text x="580" y="370" font-family="Arial" font-size="12" font-weight="bold" fill="#1f2937" text-anchor="middle">Packing List</text>
  <text x="580" y="410" font-family="Arial" font-size="28" font-weight="bold" fill="#10B981" text-anchor="middle">68%</text>
  <text x="580" y="435" font-family="Arial" font-size="10" fill="#6b7280" text-anchor="middle">packed</text>
  <text x="580" y="465" font-family="Arial" font-size="9" fill="#F59E0B" text-anchor="middle">12 items remaining</text>

  <text x="400" y="40" font-family="Arial" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Travel Planner</text>
</svg>
