<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="card" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="700" cy="100" r="150" fill="#ffffff" opacity="0.1"/>
  <circle cx="100" cy="500" r="100" fill="#ffffff" opacity="0.1"/>

  <!-- Main card -->
  <rect x="100" y="80" width="600" height="440" rx="20" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.3"/>

  <!-- Dashboard mockup elements -->
  <!-- Header -->
  <rect x="130" y="110" width="200" height="30" rx="5" fill="#ffffff" opacity="0.9"/>

  <!-- Stat cards row -->
  <rect x="130" y="160" width="130" height="80" rx="10" fill="#ffffff" opacity="0.95"/>
  <rect x="280" y="160" width="130" height="80" rx="10" fill="#ffffff" opacity="0.95"/>
  <rect x="430" y="160" width="130" height="80" rx="10" fill="#ffffff" opacity="0.95"/>
  <rect x="580" y="160" width="90" height="80" rx="10" fill="#ffffff" opacity="0.95"/>

  <!-- Chart area -->
  <rect x="130" y="260" width="280" height="150" rx="10" fill="#ffffff" opacity="0.95"/>
  <!-- Chart bars -->
  <rect x="160" y="340" width="30" height="50" rx="3" fill="#10B981"/>
  <rect x="200" y="320" width="30" height="70" rx="3" fill="#10B981"/>
  <rect x="240" y="300" width="30" height="90" rx="3" fill="#10B981"/>
  <rect x="280" y="290" width="30" height="100" rx="3" fill="#10B981"/>
  <rect x="320" y="310" width="30" height="80" rx="3" fill="#10B981"/>
  <rect x="360" y="280" width="30" height="110" rx="3" fill="#10B981"/>

  <!-- Side panel -->
  <rect x="430" y="260" width="240" height="150" rx="10" fill="#ffffff" opacity="0.95"/>
  <!-- Progress rings mockup -->
  <circle cx="480" cy="335" r="30" fill="none" stroke="#e5e7eb" stroke-width="6"/>
  <circle cx="480" cy="335" r="30" fill="none" stroke="#10B981" stroke-width="6" stroke-dasharray="140 200" transform="rotate(-90 480 335)"/>
  <circle cx="570" cy="335" r="30" fill="none" stroke="#e5e7eb" stroke-width="6"/>
  <circle cx="570" cy="335" r="30" fill="none" stroke="#059669" stroke-width="6" stroke-dasharray="100 200" transform="rotate(-90 570 335)"/>

  <!-- Bottom row -->
  <rect x="130" y="430" width="540" height="60" rx="10" fill="#ffffff" opacity="0.95"/>

  <!-- Dollar icon -->
  <circle cx="400" cy="550" r="25" fill="#ffffff" opacity="0.9"/>
  <text x="400" y="558" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#10B981" text-anchor="middle">$</text>

  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" text-anchor="middle">Financial Dashboard</text>
</svg>
