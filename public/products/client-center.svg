  <rect x="155" y="150" width="200" height="25" rx="3" fill="#94a3b8"/>
  <text x="255" y="167" font-family="Arial" font-size="10" fill="#ffffff" text-anchor="middle">Leads: 12 ($24,000)</text>
  <rect x="170" y="180" width="170" height="25" rx="3" fill="#0EA5E9"/>
