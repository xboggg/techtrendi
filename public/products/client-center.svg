<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0EA5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0284C7;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg5)"/>
  <circle cx="700" cy="100" r="140" fill="#ffffff" opacity="0.08"/>

  <rect x="100" y="80" width="600" height="440" rx="20" fill="#ffffff" opacity="0.15"/>

  <!-- Pipeline Funnel -->
  <rect x="130" y="110" width="250" height="180" rx="10" fill="#ffffff" opacity="0.95"/>
