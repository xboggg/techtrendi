  <text x="150" y="380" font-family="Arial" font-size="11" fill="#1f2937">Acme Corp</text>
  <text x="350" y="380" font-family="Arial" font-size="11" fill="#10B981">Active</text>
  <text x="500" y="380" font-family="Arial" font-size="11" fill="#1f2937">$8,500</text>
  <rect x="150" y="390" width="500" height="1" fill="#e5e7eb"/>
